<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 60px; cursor: pointer; margin: 5px; }
        .result { margin-top: 20px; background: #e2e8f0; padding: 10px; border-radius: 20px; }
    </style>
</head>
<body>
    <h1>Тест</h1>
    <p>Если кнопка срабатывает — сайт работает.</p>
    <button id="testBtn">Нажми меня</button>
    <div class="result" id="result"></div>
    <script>
        document.getElementById('testBtn').addEventListener('click', () => {
            document.getElementById('result').innerHTML = '✅ Кнопка работает! ' + new Date().toLocaleTimeString();
        });
        console.log('Скрипт загружен');
    </script>
</body>
</html>
